###############################################################################
# Nginx Config — Tarous (tarouss.io.vn)
# EC2: 2 vCPU / 8GB RAM
#
# Kiến trúc ĐÚNG:
#   PM2 cluster chạy N workers trên CÙNG 1 port (4000).
#   Nginx KHÔNG cần load balance giữa nhiều ports.
#   PM2 tự phân phối connections đến workers bằng cơ chế cluster Node.js.
#   Nginx chỉ cần proxy đến 127.0.0.1:4000 như bình thường.
#
# Áp dụng:
#   sudo nginx -t && sudo systemctl reload nginx
###############################################################################

server {
    listen 80;
    server_name tarouss.io.vn www.tarouss.io.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tarouss.io.vn www.tarouss.io.vn;

    # ─── SSL (Let's Encrypt / Certbot) ───────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/tarouss.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tarouss.io.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ─── Security Headers ─────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Gzip Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        application/x-javascript image/svg+xml
        application/manifest+json;

    # ─── Frontend — Serve Static Files ───────────────────────────────────
    root /var/www/tarouss/frontend/dist;
    index index.html;

    # Cache static assets lâu dài (JS/CSS có hash trong tên file)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ─── Health Check ─────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ─── API requests → Backend (PM2 cluster trên port 4000) ──────────────
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";        # Bắt buộc cho HTTP keepalive
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout cho upload video/image
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 500M;

        # Retry sang worker khác nếu lỗi
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ─── Socket.IO → Backend ─────────────────────────────────────────────
    # PM2 cluster: tất cả workers nghe trên cùng port 4000.
    # Socket.IO với Redis adapter sẽ tự route events đến đúng worker.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;

        # KHÔNG retry Socket.IO (gây duplicate connections)
        proxy_next_upstream off;
    }

    # ─── Frontend SPA — Fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # Cache index.html ngắn để client nhận update nhanh
        add_header Cache-Control "public, max-age=300";
    }

    # ─── Nginx Status (chỉ localhost) ─────────────────────────────────────
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }
}
