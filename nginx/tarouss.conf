###############################################################################
# Nginx Config — Tarous (tarouss.io.vn)
# EC2: 2 vCPU / 8GB RAM
# Kiến trúc: Nginx → PM2 Cluster (2 workers: port 4000, 4001)
#
# Áp dụng:
#   sudo nginx -t                        # Kiểm tra cú pháp
#   sudo systemctl reload nginx          # Áp dụng không downtime
###############################################################################

# ─── Rate Limiting Zones ─────────────────────────────────────────────────────
# Phải đặt trong http block. Nếu nginx.conf đã có http block, đặt phần này
# vào /etc/nginx/conf.d/ hoặc thêm vào nginx.conf trước server block.
#
# Khai báo các zones (UNCOMMENT phần này nếu đây là file standalone):
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
# limit_req_zone $binary_remote_addr zone=auth_limit:5m  rate=5r/m;
# limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

###############################################################################

# ─── Upstream: Load Balance giữa 2 PM2 workers ───────────────────────────────
upstream tarous_backend {
    # least_conn: gửi request đến worker đang xử lý ít request nhất
    least_conn;

    server 127.0.0.1:4000 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:4001 weight=1 max_fails=3 fail_timeout=30s;

    # Duy trì kết nối tái sử dụng (HTTP/1.1 keep-alive) với backend
    keepalive 32;
}

# ─── Upstream Socket.IO: dùng ip_hash để sticky sessions ────────────────────
# Socket.IO cần cùng một client luôn kết nối vào cùng 1 worker trong
# giai đoạn handshake polling. Sau khi upgrade lên WebSocket thì không cần.
# Redis adapter xử lý việc routing events giữa workers.
upstream tarous_socketio {
    ip_hash;    # Client cùng IP → cùng worker (cần cho polling transport)

    server 127.0.0.1:4000;
    server 127.0.0.1:4001;

    keepalive 64;
}

server {
    listen 80;
    server_name tarouss.io.vn www.tarouss.io.vn;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tarouss.io.vn www.tarouss.io.vn;

    # ─── SSL (Let's Encrypt / Certbot) ───────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/tarouss.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tarouss.io.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ─── Security Headers ─────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Gzip Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        application/x-javascript image/svg+xml
        application/manifest+json;

    # ─── Rate Limiting (Nginx Level) ──────────────────────────────────────
    # Zone phải được khai báo trong http block (ví dụ: /etc/nginx/nginx.conf)
    # Uncomment sau khi thêm limit_req_zone vào nginx.conf:
    # limit_req zone=api_limit burst=100 nodelay;
    # limit_conn conn_limit 50;

    # ─── Frontend — Serve Static Files ───────────────────────────────────
    root /var/www/tarouss/frontend/dist;
    index index.html;

    # Cache static assets (JS, CSS, images) rất lâu
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ─── Health Check ─────────────────────────────────────────────────────
    location /health {
        proxy_pass http://tarous_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ─── API requests → Load Balanced Backend ─────────────────────────────
    location /api/ {
        proxy_pass http://tarous_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";        # Bắt buộc cho keepalive
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limit auth endpoints chặt hơn
        # limit_req zone=auth_limit burst=10 nodelay;   # Uncomment sau khi thêm zone

        # Timeout cho upload video/image
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 500M;

        # Không buffer response (quan trọng cho streaming)
        proxy_buffering off;

        # Retry nếu worker down
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ─── Socket.IO → Sticky Load Balancing ───────────────────────────────
    location /socket.io/ {
        proxy_pass http://tarous_socketio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived WebSocket connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;

        # Không retry Socket.IO connections (gây duplicate connections)
        proxy_next_upstream off;
    }

    # ─── Frontend SPA — Fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Cache index.html ngắn (5 phút) để client nhận update nhanh
        add_header Cache-Control "public, max-age=300";
    }

    # ─── Nginx Status (chỉ cho localhost monitoring) ──────────────────────
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }
}
